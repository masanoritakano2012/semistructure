name: 半導体ニュース自動投稿

on:
  workflow_dispatch:
    inputs:
      article_file:
        description: '投稿する記事ファイル名（articles/ready/内）'
        required: true
        type: string
      status:
        description: '投稿ステータス'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - publish

  push:
    paths:
      - 'articles/ready/**/*.html'

permissions:
  contents: write

jobs:
  post-to-wordpress:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests

      - name: 投稿ファイルを特定（pushイベント時）
        if: github.event_name == 'push'
        id: find-file
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'articles/ready/*.html' | head -1)
          echo "file=$FILES" >> $GITHUB_OUTPUT
          echo "投稿対象ファイル: $FILES"

      - name: WordPressに投稿（手動実行時）
        if: github.event_name == 'workflow_dispatch'
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
        run: |
          python scripts/post_to_wordpress.py \
            --file "articles/ready/${{ github.event.inputs.article_file }}" \
            --status "${{ github.event.inputs.status }}"

      - name: WordPressに投稿（pushイベント時）
        if: github.event_name == 'push' && steps.find-file.outputs.file != ''
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
        run: |
          python scripts/post_to_wordpress.py \
            --file "${{ steps.find-file.outputs.file }}" \
            --status "draft"

      - name: ログをコミット
        if: success()
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"
          git add logs/ articles/posted/ || true
          git diff --staged --quiet || git commit -m "投稿ログ更新 $(date '+%Y-%m-%d %H:%M')"
          git push
